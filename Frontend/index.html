<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DriveAway</title>
  <link rel="stylesheet" href="/static/css/common.css">
  <link rel="stylesheet" href="/static/css/home.css">
  <link rel="stylesheet" href="/static/css/modals.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="container nav">
    <div class="logo">🚗 DriveAway</div>

    <nav>
      <a href="/">Home</a>
      <a href="/about">About</a>
      <button class="profile-btn" id="headerProfileBtn">Profile</button>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Find Your Perfect Ride</h1>
    <p>Choose from our wide selection of premium vehicles</p>

    <div class="search-box">
      <input type="text" placeholder="City or Airport" />
      <input type="date" />
      <input type="date" />
      <button>Search Cars</button>
    </div>
  </div>
</section>

<!-- MAIN -->
<main class="container main-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <h3>Price Range</h3>
    <input type="range" min="50" max="410" value="200" />

    <div class="range-labels">
      <span>$50</span>
      <span>$410/day</span>
    </div>

    <hr>

    <h3>Category</h3>
    <label><input type="checkbox"> Sedan</label>
    <label><input type="checkbox"> SUV</label>
    <label><input type="checkbox"> Sports</label>
    <label><input type="checkbox"> Electric</label>
    <label><input type="checkbox"> Compact</label>
    <label><input type="checkbox"> Convertible</label>

    <hr>

    <h3>Transmission</h3>
    <label><input type="checkbox"> Automatic</label>
    <label><input type="checkbox"> Manual</label>

  </aside>

  <!-- CAR LIST -->
  <section class="cars">

    <h2>Available Cars (6)</h2>

    <div class="car-grid" id="carGrid"></div>

  </section>

</main>

<script src="/static/js/script.js"></script>
</body>
</html>
